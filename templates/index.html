<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartWaste Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.3.4/css/dataTables.bootstrap5.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/datatables.net-buttons-bs5@3.2.5/css/buttons.bootstrap5.min.css" rel="stylesheet" />
  <link href="/static/css/styles.css" rel="stylesheet" />
</head>
<body>
  <div id="app-root" class="app-root">
    <div id="splash-screen" class="splash-screen">
      <div class="splash-overlay"></div>
      <div class="text-center position-relative z-1">
        <img src="/static/assets/logo.png" alt="SmartWaste logo" class="splash-logo mb-3" />
        <h1 class="display-5 fw-bold text-success-emphasis mb-2">SmartWaste Management System</h1>
        <p class="lead text-muted mb-4">SQLite-backed management dashboard for administrators, city heads, and field staff.</p>
        <div class="spinner-border text-success" role="status" aria-hidden="true"></div>
      </div>
    </div>

    <section id="login-view" class="login-view d-none">
      <div class="container py-5 min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
          <div class="col-12 col-lg-5">
            <div class="text-center mb-4">
              <img src="/static/assets/logo.png" alt="SmartWaste logo" class="login-logo mb-3" />
              <h2 class="fw-bold text-success-emphasis">Welcome back</h2>
              <p class="text-muted mb-0">Choose your role and sign in to continue.</p>
            </div>
            <div class="card shadow-lg border-0 rounded-4">
              <div class="card-body p-4 p-md-5">
                <div class="mb-3">
                  <label class="form-label fw-semibold">Select role</label>
                  <div id="role-selector" class="d-flex flex-wrap gap-2"></div>
                </div>
                <form id="login-form" novalidate>
                  <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Username</label>
                    <input id="username" name="username" type="text" class="form-control form-control-lg" placeholder="Enter username" required />
                  </div>
                  <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <input id="password" name="password" type="password" class="form-control form-control-lg" placeholder="Enter password" required />
                  </div>
                  <div class="alert alert-danger d-none" id="login-error"></div>
                  <button type="submit" class="btn btn-success btn-lg w-100">Login</button>
                </form>
                <div class="mt-4 small text-muted">
                  Default admin account:
                  <span class="fw-semibold">admin / admin123</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="dashboard-view" class="dashboard-view d-none">
      <div class="app-shell">
        <aside class="sidebar-panel">
          <div>
            <div class="sidebar-brand">
              <img src="/static/assets/logo.png" alt="SmartWaste logo" class="sidebar-logo" />
              <div>
                <div class="fw-bold text-white">SmartWaste</div>
                <div class="small text-white-50">SQLite + AI Validation</div>
              </div>
            </div>
            <div class="sidebar-user-card mt-4">
              <div class="fw-semibold fs-5" id="sidebar-user-name"></div>
              <div class="text-white-50 small" id="sidebar-user-role"></div>
              <div class="small mt-3 text-white-50" id="sidebar-user-meta"></div>
            </div>
            <nav class="nav flex-column gap-2 mt-4" id="sidebar-nav"></nav>
          </div>
          <button id="logout-btn" class="btn btn-outline-light w-100 rounded-3">
            <i class="bi bi-box-arrow-right me-2"></i>Logout
          </button>
        </aside>

        <main class="content-panel">
          <div class="topbar rounded-4 shadow-sm mb-4">
            <div>
              <div class="small text-muted">SmartWaste Operations</div>
              <h3 class="mb-0" id="page-title">Dashboard</h3>
            </div>
            <div class="text-end">
              <div class="fw-semibold" id="topbar-date"></div>
              <div class="small text-muted" id="topbar-time"></div>
            </div>
          </div>

          <div id="content-area"></div>
        </main>
      </div>
    </section>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="app-toast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="app-toast-body"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net@2.3.4/js/dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.3.4/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-buttons@3.2.5/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-buttons-bs5@3.2.5/js/buttons.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-buttons@3.2.5/js/buttons.html5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-buttons@3.2.5/js/buttons.print.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
